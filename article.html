    /* Article pagination */

<body class="pei-page">

<div id="site-navbar"></div>

<main style="padding-top:80px;overflow-x:clip;">

  <!-- 育兒文章列表：由 articles.json 動態載入渲染，見頁尾 <script> -->
  <section class="position-relative overflow-hidden" style="padding:7rem 0;" data-fade>
    <div class="geometric-decor rounded-circle" style="width:16rem;height:16rem;bottom:-5rem;left:-5rem;background:#F5E1DA;opacity:.2;"></div>
    <div class="container" style="max-width:1200px;">
      <div class="text-center mb-5" data-fade>
        <h2 class="fw-bold mb-3 text-pei" style="font-size:2rem;">育兒文章</h2>
      </div>

      <!-- 讀取中狀態 -->
      <div id="articlesLoading" class="text-center py-5">
        <div class="spinner-border text-pei" role="status" style="width:3rem;height:3rem;">
          <span class="visually-hidden">載入中...</span>
        </div>
        <p class="mt-3" style="color:#424844;">文章載入中，請稍候...</p>
      </div>

      <!-- 讀取失敗狀態（articles.json 遺失、格式錯誤或網路問題時顯示） -->
      <div id="articlesError" class="text-center py-5 d-none">
        <div class="d-inline-block p-4 rounded-4" style="background:rgba(198,40,40,.08);">
          <i class="bi bi-exclamation-circle-fill fs-3 mb-2" style="color:#b3261e;"></i>
          <p class="fw-bold mb-1" style="color:#b3261e;">文章載入失敗</p>
          <p class="mb-0" style="font-size:.9rem;color:#424844;">請稍後再試一次，或聯繫網站管理員確認 articles.json 是否正常。</p>
        </div>
      </div>

      <!-- 文章卡片格線，由 JavaScript 動態填入 -->
      <div class="row g-4 mb-5" id="articlesGrid"></div>

      <!-- 分頁控制：上一頁／下一頁按鈕 + 目前頁數／總頁數 -->
      <div class="d-flex justify-content-center align-items-center gap-3 d-none" id="articlesPager">
        <button type="button" id="prevPageBtn" class="btn btn-pei-outline fw-bold">‹ 上一頁</button>
        <span id="pageIndicator" class="fw-bold" style="color:#424844;font-size:.9375rem;"></span>
        <button type="button" id="nextPageBtn" class="btn btn-pei-outline fw-bold">下一頁 ›</button>
      </div>
    </div>
  </section>

</main>

<div id="site-footer"></div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom JS -->
<script src="assets/js/components.js"></script>
<script src="assets/js/main.js"></script>

<script>
  /* ============================================================
     育兒文章列表 — 讀取 articles.json 並動態渲染文章卡片
     純原生 JavaScript，不依賴任何第三方套件
     ============================================================ */
  (function () {
    var ARTICLES_JSON_PATH = 'articles/articles.json'; // 文章索引檔路徑（位於 articles/ 資料夾內）
    var ARTICLES_DIR = 'articles/';           // 文章 HTML 檔案所在資料夾
    var PAGE_SIZE = 9;                        // 每頁顯示文章數

    // 文章沒有設定圖片、或圖片路徑載入失敗時使用的預設佔位圖
    // 使用 inline SVG（data URI）產生，不需要額外的圖片檔案，也不會有 404 的問題
    var PLACEHOLDER_IMAGE = 'data:image/svg+xml;utf8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225" viewBox="0 0 400 225">' +
      '<rect width="400" height="225" fill="#eef1ee"/>' +
      '<g fill="none" stroke="#8FA998" stroke-width="3">' +
      '<rect x="130" y="72" width="140" height="90" rx="8"/>' +
      '<circle cx="160" cy="100" r="10"/>' +
      '<path d="M130 145 L175 110 L205 135 L230 115 L270 150"/>' +
      '</g></svg>'
    );

    // 文章分類標籤配色（沿用站內其他頁面卡片標籤的既有配色），
    // 依 category 文字自動對應固定的一組配色，相同分類永遠顯示相同顏色
    var TAG_PALETTE = [
      { bg: 'rgba(206,233,214,.4)', color: '#344c3e' },
      { bg: 'rgba(227,226,224,.6)', color: '#54544f' },
      { bg: 'rgba(209,227,231,.4)', color: '#39606b' },
      { bg: 'rgba(143,169,152,.1)', color: '#8FA998' },
      { bg: 'rgba(194,153,153,.2)', color: '#785656' },
      { bg: 'rgba(255,220,189,.3)', color: '#796046' }
    ];

    function tagStyleFor(category) {
      var hash = 0;
      for (var i = 0; i < category.length; i++) {
        hash = (hash * 31 + category.charCodeAt(i)) & 0x7fffffff;
      }
      return TAG_PALETTE[hash % TAG_PALETTE.length];
    }

    var grid = document.getElementById('articlesGrid');
    var loadingEl = document.getElementById('articlesLoading');
    var errorEl = document.getElementById('articlesError');
    var pagerEl = document.getElementById('articlesPager');
    var prevBtn = document.getElementById('prevPageBtn');
    var nextBtn = document.getElementById('nextPageBtn');
    var pageIndicator = document.getElementById('pageIndicator');

    var allArticles = [];
    var currentPage = 1;

    // 建立單一篇文章的卡片 DOM（沿用 .article-card-pei 既有樣式）
    function createArticleCard(item) {
      var col = document.createElement('div');
      col.className = 'col-md-4';

      var card = document.createElement('div');
      card.className = 'article-card-pei h-100';

      var thumb = document.createElement('div');
      thumb.className = 'thumb';
      var img = document.createElement('img');
      img.src = item.image || PLACEHOLDER_IMAGE; // 沒有設定圖片時，使用預設佔位圖
      img.alt = item.title;
      img.loading = 'lazy'; // 圖片延遲載入，避免一次載入過多圖片影響效能
      img.addEventListener('error', function () {
        img.src = PLACEHOLDER_IMAGE; // 圖片路徑失效（如檔案不存在）時，改用預設佔位圖
      });
      thumb.appendChild(img);

      var body = document.createElement('div');
      body.className = 'p-4';

      // category 可為空，留空時不顯示標籤
      if (item.category) {
        var style = tagStyleFor(item.category);
        var tag = document.createElement('span');
        tag.className = 'd-inline-block px-3 py-1 mb-3 fw-bold';
        tag.style.background = style.bg;
        tag.style.color = style.color;
        tag.style.borderRadius = '9999px';
        tag.style.fontSize = '.75rem';
        tag.textContent = item.category;
        body.appendChild(tag);
      }

      var h4 = document.createElement('h4');
      h4.className = 'fw-bold mb-2 line-clamp-2';
      h4.style.fontSize = '1rem';
      h4.style.color = '#1b1c1b';
      h4.style.lineHeight = '1.5';
      var a = document.createElement('a');
      a.href = ARTICLES_DIR + item.file; // 點擊標題連結到對應的文章 HTML
      a.style.color = 'inherit';
      a.style.textDecoration = 'none';
      a.textContent = item.title;
      h4.appendChild(a);

      var p = document.createElement('p');
      p.className = 'line-clamp-2 mb-0';
      p.style.color = '#424844';
      p.style.fontSize = '.875rem';
      p.style.lineHeight = '1.7';
      p.textContent = item.summary || '';

      body.appendChild(h4);
      body.appendChild(p);
      card.appendChild(thumb);
      card.appendChild(body);
      col.appendChild(card);
      return col;
    }

    // 渲染指定頁數的文章卡片，並更新分頁按鈕狀態
    function renderPage(page) {
      var totalPages = Math.max(1, Math.ceil(allArticles.length / PAGE_SIZE));
      currentPage = Math.min(Math.max(page, 1), totalPages);

      var start = (currentPage - 1) * PAGE_SIZE;
      var pageItems = allArticles.slice(start, start + PAGE_SIZE);

      grid.innerHTML = '';
      var fragment = document.createDocumentFragment();
      pageItems.forEach(function (item) {
        fragment.appendChild(createArticleCard(item));
      });
      grid.appendChild(fragment);

      pageIndicator.textContent = '第 ' + currentPage + ' 頁 / 共 ' + totalPages + ' 頁';
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
      pagerEl.classList.toggle('d-none', totalPages <= 1);
    }

    prevBtn.addEventListener('click', function () {
      renderPage(currentPage - 1);
      grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nextBtn.addEventListener('click', function () {
      renderPage(currentPage + 1);
      grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    // 讀取 articles.json
    fetch(ARTICLES_JSON_PATH)
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        if (!Array.isArray(data)) throw new Error('articles.json 格式錯誤：最外層必須是陣列');

        // 依 articles.json 陣列原本的順序顯示（不自動依日期排序）
        // 新增文章時，請直接貼在陣列「最上方」，該篇就會顯示在文章列表的最前面
        allArticles = data;

        loadingEl.classList.add('d-none');

        if (allArticles.length === 0) {
          grid.innerHTML = '<p class="text-center" style="color:#424844;">目前尚無文章</p>';
          return;
        }

        renderPage(1);
      })
      .catch(function (err) {
        // 讀取失敗（找不到檔案、JSON 格式錯誤、網路問題等）時顯示錯誤提示
        console.error('載入 articles.json 失敗：', err);
        loadingEl.classList.add('d-none');
        errorEl.classList.remove('d-none');
      });
  })();
</script>

<!-- ================================================================
     維護說明（給日後新增文章的人看，正式環境可保留此註解不會顯示在畫面上）

     一、新增文章的步驟：
        1. 複製 articles/20260630.html，重新命名為新文章的檔名
           （檔名可自訂，不一定要用日期，例如 articles/my-article.html
           也可以，只要跟 articles.json 裡的 file 欄位對應即可）。
        2. 打開新複製的檔案，依照裡面的 TEMPLATE 註解，
           替換 title、description、keywords、Open Graph、分類標籤、
           標題、日期、內文段落、圖片等內容。
        3. 若文章有搭配圖片，建議在 articles/img/ 底下建立一個
           對應的資料夾（例如 articles/img/my-article/），
           將圖片放進去，並在文章內用相對路徑引用，例如：
           <img src="img/my-article/1.png">
        4. 在 articles/articles.json 陣列「最上方」新增一筆資料
           （詳見下方「新增範例」），儲存後即完成，
           不需要修改 article.html。

     二、articles.json 新增範例：
        文章列表會依照這個陣列本身的順序顯示（由上到下），
        不會自動依日期重新排序，所以新文章請直接貼在陣列最上方
        （也就是最外層 [ 的正下方），這樣它就會顯示在文章列表最前面：

        [
          {
            "title": "文章標題",
            "date": "2026-08-15",
            "file": "20260815.html",
            "summary": "約 50 字的文章摘要，會顯示在文章列表卡片中。",
            "category": "分類標籤",
            "image": "articles/img/20260815/cover.png"
          },
          ... 原本其他文章的資料保持不動 ...
        ]

        欄位說明：
        - title：文章標題（文字）
        - date：發布日期，格式建議統一用 YYYY-MM-DD
                （目前僅顯示於文章內頁，不影響列表排序）
        - file：對應的 HTML 檔名，放在 /articles/ 資料夾內，
                只需填檔名（例如 "20260815.html"），
                不用加上 "articles/" 前綴
        - summary：文章摘要，約 50 字
        - category：分類標籤文字，可留空字串 ""，
                    留空時列表卡片不會顯示標籤
        - image：封面圖片路徑（從網站根目錄起算），
                 若文章沒有合適的封面圖，可以把這個欄位留空字串 ""，
                 列表會自動顯示預設的佔位圖，不會出現圖片破圖的畫面

     三、注意事項：
        - 新增資料時，記得在前一筆資料的 } 後面加上逗號 ,
          這是最容易漏掉、導致 JSON 格式錯誤的地方。
        - articles.json 內「不能」有任何註解文字，
          純 JSON 格式不支援像這裡的 /* ... */ 或 // 註解寫法。
        - 若文章列表頁打開後，卡片區塊一直顯示「文章載入中」
          或直接跳出「文章載入失敗」，最常見的原因就是
          articles.json 格式錯誤（例如少了逗號、多了逗號、
          引號沒有成對）。可以將 articles.json 的內容貼到
          線上 JSON 驗證工具（例如搜尋「JSON validator」）
          檢查語法是否正確；也可以打開瀏覽器的開發者工具（F12）
          切到 Console 分頁，若讀取失敗畫面上的錯誤原因也會印在那裡。
        - 由於這是純靜態網站、沒有後端伺服器，articles.json
          需要透過網頁伺服器（http:// 或 https://）讀取，
          直接用瀏覽器打開本機的 article.html（file:// 開頭）
          會因為瀏覽器安全性限制而無法讀取 articles.json，
          測試時請先啟動一個本機伺服器（例如
          `python3 -m http.server` 或編輯器內建的 Live Server）。
================================================================= -->
</body>
